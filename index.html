<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Laboratorium</title>
    <style>
        :root {
            --primary: #5D6532;
            --primary-dark: #3e4422;
            --primary-light: #7a8440;
            --primary-xlight: #a8b56a;
            --accent: #c8d97a;
            --success: #25d366;
            --glass-bg: rgba(93, 101, 50, 0.18);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 8px 32px rgba(62, 68, 34, 0.35);
            --text-on-dark: #f0f4d8;
            --text-muted: rgba(240, 244, 216, 0.7);
            --input-bg: rgba(255, 255, 255, 0.12);
            --card-bg: rgba(255, 255, 255, 0.10);
            --preview-bg: rgba(20, 30, 10, 0.82);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100dvh;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(168,181,106,0.35) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(62,68,34,0.5) 0%, transparent 55%),
                linear-gradient(135deg, #2e3515 0%, #4a5228 40%, #6b7a38 70%, #3e4422 100%);
            background-attachment: fixed;
            padding: 12px;
            color: var(--text-on-dark);
        }

        /* Landscape / PC layout */
        @media (min-width: 768px) {
            body { padding: 24px; }
        }

        @media (orientation: landscape) and (max-width: 900px) {
            body { padding: 8px 16px; }
            .main-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
            .preview-section { grid-column: 1 / -1; }
        }

        @media (min-width: 900px) {
            .main-grid { grid-template-columns: 1fr 1fr; gap: 20px; max-width: 960px; margin: 0 auto; }
            .preview-section { grid-column: 1 / -1; }
        }

        /* Glass container */
        .glass-container {
            background: rgba(62, 68, 34, 0.35);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            padding: 18px;
            max-width: 960px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            color: var(--accent);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(200, 217, 122, 0.35);
            text-shadow: 0 0 20px rgba(200,217,122,0.5);
        }

        /* Glass card */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.68rem;
            margin-bottom: 6px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input[type="date"] {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid rgba(200, 217, 122, 0.3);
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 10px;
            background: var(--input-bg);
            color: var(--text-on-dark);
            -webkit-appearance: none;
            appearance: none;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: border-color 0.2s, background 0.2s;
            outline: none;
        }

        select:focus, input[type="date"]:focus {
            border-color: rgba(200, 217, 122, 0.7);
            background: rgba(255,255,255,0.18);
        }

        select option { background: #3e4422; color: #f0f4d8; }

        /* Dinas grid */
        .dinas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Patient counter cards */
        .patient-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 10px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: background 0.2s;
        }

        .patient-card:hover { background: rgba(255,255,255,0.15); }

        .kat-title {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .kat-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        .counter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(200,217,122,0.12);
        }

        .counter-row:last-child { border-bottom: none; margin-bottom: 0; }

        .counter-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .btn-group { display: flex; align-items: center; gap: 12px; }

        button.math {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(200,217,122,0.4);
            background: rgba(93,101,50,0.5);
            color: var(--accent);
            border-radius: 10px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            -webkit-appearance: none;
            touch-action: manipulation;
            backdrop-filter: blur(4px);
        }

        button.math:hover { background: rgba(93,101,50,0.8); border-color: var(--accent); }
        button.math:active { transform: scale(0.92); background: var(--primary-light); }

        .val {
            font-weight: 700;
            min-width: 28px;
            text-align: center;
            font-size: 20px;
            color: #fff;
            text-shadow: 0 0 10px rgba(200,217,122,0.6);
        }

        /* Preview box */
        #preview {
            width: 100%;
            min-height: 300px;
            background: var(--preview-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #a8e6c1;
            padding: 14px;
            border-radius: 12px;
            font-family: "Courier New", Courier, monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-x: hidden;
            border: 1px solid rgba(200,217,122,0.3);
            margin-top: 10px;
            -webkit-user-select: all;
            -moz-user-select: all;
            user-select: all;
            line-height: 1.6;
        }

        .preview-label {
            font-size: 0.68rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        /* Buttons */
        .btn-wrap {
            display: flex;
            gap: 12px;
            margin-top: 14px;
        }

        .btn-copy, .btn-wa {
            flex: 1;
            padding: 16px 8px;
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
            -webkit-appearance: none;
            touch-action: manipulation;
        }

        .btn-copy {
            background: rgba(24, 90, 220, 0.55);
            box-shadow: 0 4px 20px rgba(24,90,220,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
        }

        .btn-wa {
            background: rgba(37, 211, 102, 0.45);
            box-shadow: 0 4px 20px rgba(37,211,102,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
        }

        .btn-copy:hover { background: rgba(24, 90, 220, 0.75); }
        .btn-wa:hover { background: rgba(37, 211, 102, 0.65); }
        .btn-copy:active, .btn-wa:active { transform: scale(0.97); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(62,68,34,0.95);
            backdrop-filter: blur(12px);
            color: var(--accent);
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            z-index: 100;
            white-space: nowrap;
            border: 1px solid rgba(200,217,122,0.4);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .info-box {
            background: rgba(200,217,122,0.12);
            border: 1px solid rgba(200,217,122,0.3);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 12px;
            color: var(--accent);
            margin-top: 10px;
            display: none;
        }

        /* Section divider */
        .section-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 8px;
            padding-left: 2px;
        }

        /* Main grid */
        .main-grid { display: grid; grid-template-columns: 1fr; gap: 0; }

        @media (min-width: 768px) {
            .glass-container { padding: 28px; }
            h2 { font-size: 1.1rem; }
            #preview { font-size: 13px; min-height: 350px; }
            button.math { width: 44px; height: 44px; }
        }
    </style>
</head>
<body>

<div class="glass-container">
    <h2>Laporan Lab Rumkit</h2>

    <div class="main-grid" id="main-grid">

        <div id="left-col">
            <!-- Form -->
            <div class="glass-card">
                <label>Waktu Laporan</label>
                <select id="salam-opt" onchange="generate()">
                    <option value="auto">Otomatis (Sesuai Waktu)</option>
                    <option value="Selamat Pagi">Selamat Pagi</option>
                    <option value="Selamat Siang">Selamat Siang</option>
                    <option value="Selamat Malam">Selamat Malam</option>
                </select>

                <label>Tanggal</label>
                <input type="date" id="tgl" onchange="generate()">

                <div class="dinas-grid">
                    <div>
                        <label>Dinas Saat Ini</label>
                        <select id="s1" onchange="generate()">
                            <option>Dinas Siang</option><option>Dinas Pagi</option><option>Dinas Malam</option>
                        </select>
                        <select id="n1" onchange="generate()">
                            <option>Koptu Adel</option><option>Sukwan Aris</option><option>Sukwan Lioni</option><option>P3K Monica</option>
                        </select>
                    </div>
                    <div>
                        <label>Dinas Sebelumnya</label>
                        <select id="s2" onchange="generate()">
                            <option>Dinas Pagi</option><option>Dinas Siang</option><option>Dinas Malam</option>
                        </select>
                        <select id="n2" onchange="generate()">
                            <option>Sukwan Aris</option><option>Sukwan Lioni</option><option>P3K Monica</option><option>Koptu Adel</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Patient counters -->
            <div class="section-label">Jumlah Pasien</div>
            <div id="input-area"></div>
        </div>

        <div id="right-col">
            <!-- Preview -->
            <div class="preview-section glass-card">
                <div class="preview-label">Pratinjau Laporan, Ketuk untuk Pilih</div>
                <div id="preview" onclick="selectText(this)"></div>
                <div id="info-box" class="info-box">
                    Ketuk teks di atas â†’ tahan â†’ Pilih Semua â†’ Salin
                </div>
                <div class="btn-wrap">
                    <button class="btn-copy" onclick="copyToClipboard()">&#128203; SALIN</button>
                    <button class="btn-wa" onclick="kirimWA()">&#128232; KIRIM WA</button>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    var kats = [
        { id: 'mil', n: 'Militer' },
        { id: 'pns', n: 'PNS' },
        { id: 'kbt', n: 'KBT' },
        { id: 'umu', n: 'Masyarakat umum' }
    ];

    var counts = {};
    kats.forEach(function(k) { counts[k.id+'_b']=0; counts[k.id+'_u']=0; });

    (function() {
        var now = new Date();
        var y = now.getFullYear();
        var m = String(now.getMonth()+1).padStart(2,'0');
        var d = String(now.getDate()).padStart(2,'0');
        document.getElementById('tgl').value = y+'-'+m+'-'+d;
    })();

    function applyLayout() {
        var grid = document.getElementById('main-grid');
        var isWide = window.innerWidth >= 768 || (window.innerWidth > window.innerHeight && window.innerWidth >= 600);
        if (isWide) {
            grid.style.gridTemplateColumns = '1fr 1fr';
            grid.style.gap = '18px';
        } else {
            grid.style.gridTemplateColumns = '1fr';
            grid.style.gap = '0';
        }
    }

    window.addEventListener('resize', applyLayout);
    window.addEventListener('orientationchange', function() { setTimeout(applyLayout, 150); });

    function init() {
        var area = document.getElementById('input-area');
        kats.forEach(function(k) {
            var div = document.createElement('div');
            div.className = 'patient-card';
            div.innerHTML =
                '<div class="kat-title">'+k.n+'</div>'+
                '<div class="counter-row">'+
                    '<span class="counter-label">BPJS</span>'+
                    '<div class="btn-group">'+
                        '<button class="math" onclick="set(\''+k.id+'_b\',-1)">&#8722;</button>'+
                        '<span class="val" id="'+k.id+'_b_v">0</span>'+
                        '<button class="math" onclick="set(\''+k.id+'_b\',1)">+</button>'+
                    '</div>'+
                '</div>'+
                '<div class="counter-row">'+
                    '<span class="counter-label">Umum</span>'+
                    '<div class="btn-group">'+
                        '<button class="math" onclick="set(\''+k.id+'_u\',-1)">&#8722;</button>'+
                        '<span class="val" id="'+k.id+'_u_v">0</span>'+
                        '<button class="math" onclick="set(\''+k.id+'_u\',1)">+</button>'+
                    '</div>'+
                '</div>';
            area.appendChild(div);
        });
        applyLayout();
        generate();
    }

    function set(id, v) {
        counts[id] = Math.max(0, counts[id] + v);
        document.getElementById(id+'_v').innerText = counts[id];
        generate();
    }

    function getTanggalStr() {
        var val = document.getElementById('tgl').value;
        var parts = val.split('-');
        if (parts.length !== 3) return '';
        var y = parseInt(parts[0]), m = parseInt(parts[1])-1, d = parseInt(parts[2]);
        var hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
        var bln = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        var date = new Date(y, m, d);
        return hari[date.getDay()] + ', ' + d + ' ' + bln[m] + ' ' + y;
    }

    function getLaporan() {
        var salamOpt = document.getElementById('salam-opt').value;
        var salam = "";
        if (salamOpt === "auto") {
            var hr = new Date().getHours();
            if (hr >= 6 && hr < 12) salam = "Selamat Pagi";
            else if (hr >= 12 && hr < 16) salam = "Selamat Siang";
            else salam = "Selamat Malam";
        } else {
            salam = salamOpt;
        }

        var tglStr = getTanggalStr();
        var total = 0;
        Object.keys(counts).forEach(function(k) { total += counts[k]; });

        var txt = salam+'\nIjin melaporkan serah terima Dinas Laboratorium Rumkit TNI AD\n*'+tglStr+'*\nSebagai berikut :\n\n';
        txt += '*'+document.getElementById('s1').value+'*\n  '+document.getElementById('n1').value+'\n\n';
        txt += '*'+document.getElementById('s2').value+'*\n  '+document.getElementById('n2').value+'\n\n';
        txt += 'Jumlah pasien : '+total+' Orang\nKeterangan :\n\n';
        txt += 'Lab Rutin     : '+total+' Orang\nKet           :\n';

        kats.forEach(function(k, i) {
            var b = counts[k.id+'_b'];
            var u = counts[k.id+'_u'];
            var label = k.n;
            while (label.length < 16) label += ' ';
            if (b === 0 && u === 0) {
                txt += (i+1)+'. '+label+' : nihil\n';
            } else {
                txt += (i+1)+'. '+label+' :\n';
                if (b > 0) txt += '      - BPJS        : '+b+' Orang\n';
                if (u > 0) txt += '      - Umum        : '+u+' Orang\n';
            }
        });

        txt += '\nRumkit TNI-AD dalam keaadan aman, Laporan Selesai.';
        return txt;
    }

    function generate() {
        document.getElementById('preview').innerText = getLaporan();
    }

    function selectText(node) {
        try {
            var range = document.createRange();
            range.selectNodeContents(node);
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        } catch(e) {}
    }

    function copyToClipboard() {
        var text = getLaporan();
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(function() {
                showToast('Tersalin! Buka WhatsApp dan tempel.');
            }).catch(function() { fallbackCopy(text); });
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;font-size:16px;';
        document.body.appendChild(ta);
        ta.focus();
        ta.setSelectionRange(0, text.length);
        var ok = false;
        try { ok = document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(ta);
        if (ok) {
            showToast('Tersalin! Buka WhatsApp dan tempel.');
        } else {
            document.getElementById('info-box').style.display = 'block';
            selectText(document.getElementById('preview'));
            showToast('Ketuk teks hijau â†’ tahan â†’ Salin');
        }
    }

    function kirimWA() {
        var text = getLaporan();
        var encoded = encodeURIComponent(text);
        var waUrl = 'whatsapp://send?text=' + encoded;
        window.location.href = waUrl;
        setTimeout(function() {
            window.open('https://wa.me/?text=' + encoded, '_blank');
        }, 1500);
    }

    function showToast(msg) {
        var t = document.getElementById('toast');
        t.innerText = msg || 'Tersalin!';
        t.style.display = 'block';
        setTimeout(function() { t.style.display = 'none'; }, 3000);
    }

    init();
</script>
</body>
</html>
